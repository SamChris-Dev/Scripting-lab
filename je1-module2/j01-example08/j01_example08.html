<!DOCTYPE html>
<html lang="en">
<head>
    <title>My title</title>
    <script src="j01_example08.js"></script>
    <link rel="stylesheet" href="j01_example08.css">
</head>
<body>
    
    <p id="para">JavaScript</p>

    <div class="container">
        
        <h2 id="myH2">Demo of How JS works using HTML & CSS.</h2>
        
        <p class="ourDivs">myDiv:</p>
        <div id="myDiv" class="ourDivs">Empty</div>
        <button onclick="changeText()">Change Text</button>
        <br/><br/>

        <label class="ourDivs" for="myName">My name</label>
        <input type="text" id="myName" name="myName">
        <button onclick="getNameAndWriteIntoDiv()">Get name and write into div</button>
        <br/><br/>
        
        <p class="ourDivs">myNameDiv:</p> 
        <div id="myNameDiv" class="ourDivs">Empty name</div>
        <br/><br/>

        <div id="myAgeErrorDiv" class="errorDivs"></div>
        
        <label class="ourDivs" for="myAge">My age</label>
        <input type="text" id="myAge" name="myAge" onchange="validateAge()">
        <button onclick="getAgeAndWriteIntoDiv()">Get name and write into div</button>
        <br/><br/>
        
        <p class="ourDivs">myAgeDiv:</p> 
        <div id="myAgeDiv" class="ourDivs">Empty age</div>

    </div>

</body>
</html>
